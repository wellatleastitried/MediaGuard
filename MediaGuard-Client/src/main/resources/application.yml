server:
  port: ${CLIENT_PORT:8081}

mediaguard:
  client:
    state-file: ${CLIENT_STATE_FILE:./data/client/state.json}
    download-directory: ${CLIENT_DOWNLOAD_DIRECTORY:./data/client/downloads}
    pickup-interval: ${CLIENT_PICKUP_INTERVAL:PT12H}
    server-port: ${MEDIAGUARD_SERVER_PORT:8080}
    preferred-server-host: ${MEDIAGUARD_SERVER_HOST:}
    preferred-server-url: ${MEDIAGUARD_SERVER_URL:}
